name: run-pack

# Dispatchable sim run. The Sim Control admin app triggers this via the GitHub API and passes the
# fleet's ingest key + Provy URL as inputs (that is the customer's "embed the key in your code" step,
# done from a web page instead of git). The only repo secret is GROQ_API_KEY — the free LLM tier the
# agents and the sim's own L4 judge run on. Nothing is emitted unless PROVY_EMIT is set, which this
# workflow does explicitly.
on:
  workflow_dispatch:
    inputs:
      pack:
        description: 'Domain pack (fleet) to run'
        required: true
        type: choice
        options: [support, claims, crm]
        default: support
      ingest_key:
        description: 'Provy ingest key for this fleet (provy_...). Passed by the Sim Control app.'
        required: true
        type: string
      provy_url:
        description: 'Provy ingest base URL'
        required: false
        type: string
        default: 'https://provyai.vercel.app'
      count:
        description: 'Work items (sessions) to run'
        required: false
        type: string
        default: '8'
      seed:
        description: 'RNG seed (deterministic run)'
        required: false
        type: string
        default: '1'
      reconcile:
        description: 'Post the real outcomes after the run (close the reconcile loop)'
        required: false
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run batch (emit + reconcile)
        env:
          PROVY_EMIT: '1'
          PROVY_URL: ${{ inputs.provy_url }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # The runner resolves the pack's key from PROVY_KEY_<PACK> (config/workflows.py). Only the
          # selected pack's variable is set, from the dispatch input.
          PROVY_KEY_SUPPORT: ${{ inputs.pack == 'support' && inputs.ingest_key || '' }}
          PROVY_KEY_CLAIMS:  ${{ inputs.pack == 'claims'  && inputs.ingest_key || '' }}
          PROVY_KEY_CRM:     ${{ inputs.pack == 'crm'     && inputs.ingest_key || '' }}
        run: |
          python scripts/run_batch.py \
            --pack "${{ inputs.pack }}" \
            --count "${{ inputs.count }}" \
            --seed "${{ inputs.seed }}" \
            ${{ inputs.reconcile && '--reconcile' || '' }}
